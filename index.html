<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book a Meeting | Ekwa Partners</title>
  <meta name="description" content="Schedule a meeting with the Ekwa Partners team." />
  <style>
    :root {
      --bg-1: #0f0c29;
      --bg-2: #302b63;
      --bg-3: #24243e;
      --accent: #7f5af0;
      --accent-2: #2cb67d;
      --text: #fffffe;
      --muted: #94a1b2;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      color: var(--text);
      background: linear-gradient(-45deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-1));
      background-size: 400% 400%;
      animation: gradientShift 18s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 3rem;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    header {
      text-align: center;
      max-width: 640px;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 0.8rem;
      background: linear-gradient(90deg, #fffffe, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.lead {
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
      color: var(--muted);
      line-height: 1.6;
    }

    .scheduler {
      width: 100%;
      max-width: 900px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 0.5rem;
      backdrop-filter: blur(8px);
    }

    .scheduler iframe { border: 0; width: 100%; min-height: 720px; border-radius: 12px; }

    .ref-tag {
      display: none;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <h1>Book a Meeting</h1>
    <p class="lead">Schedule a time that works for you with the Ekwa Partners team.</p>
  </header>

  <!-- YouCanBookMe scheduler (inline iframe embed).
       data-copyparameters carries ?REFCODE=CODE from this page's URL into the booking form. -->
  <div class="scheduler">
    <script src="https://embed.ycb.me"
            async="true"
            data-domain="lila-standalone-partner-t"
            data-type="iframe"
            data-displaymode="auto"
            data-copyparameters="true"></script>
  </div>

  <div class="ref-tag" id="refTag"></div>

  <script>
    // Testing aid: show which referral code this visit carries.
    // data-copyparameters handles the actual hand-off to YCBM; this just confirms it.
    (function () {
      const ref = new URLSearchParams(location.search).get('REFCODE');
      const tag = document.getElementById('refTag');
      if (ref) {
        tag.textContent = 'Referral code detected: ' + ref;
        tag.style.display = 'block';
      }
    })();
  </script>
</body>
</html>
