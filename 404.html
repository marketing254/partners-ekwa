<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Book a Meeting | Ekwa Partners</title>
  <meta name="description" content="Book your Marketing Strategy Meeting with Ekwa Marketing.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      color: #1b315a;
      background: linear-gradient(180deg, #ffffff, #f7fbff);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      padding: 44px 16px;
    }
    header { text-align: center; max-width: 640px; margin-bottom: 24px; }
    h1 { font-size: clamp(24px, 3vw, 34px); font-weight: 800; margin-bottom: 10px; letter-spacing: -.02em; }
    p.lead { color: #51657f; font-size: 15px; line-height: 1.6; }
    .scheduler {
      width: 100%; max-width: 900px; background: #fff;
      border: 1px solid rgba(31,78,149,.14); border-radius: 16px; padding: 8px;
      box-shadow: 0 18px 45px rgba(31,78,149,.10);
    }
    .scheduler iframe { width: 100%; min-height: 700px; border: 0; border-radius: 12px; display: block; }
    .notice { display: none; max-width: 520px; text-align: center; color: #51657f; line-height: 1.6; font-size: 15px; }
  </style>
</head>
<body>
  <header>
    <h1>Book a Meeting</h1>
    <p class="lead">Schedule your Marketing Strategy Meeting with the Ekwa team.</p>
  </header>

  <div class="scheduler" id="schedWrap">
    <iframe id="ycbm" title="Book a meeting" loading="lazy"></iframe>
  </div>
  <p class="notice" id="notice">Please use the booking link your partner shared with you.</p>

  <script>
    // Generic fallback booking page. Works for any /<owner>/<partner> path that
    // doesn't have a custom designed page. Picks the owner's scheduler and passes
    // REFCODE = "owner/partner". Root or unknown owner shows the notice.
    (function () {
      var SCHEDULERS = {
        lila: 'https://lila-standalone-partner.youcanbook.me/',
        sam:  'https://sam-partner-network.youcanbook.me/'
      };
      var parts = location.pathname.split('/').filter(Boolean); // ['msm','lila','marylemay']
      var owner = parts[0] === 'msm' ? (parts[1] || '').toLowerCase() : '';
      var partner = parts[0] === 'msm' ? (parts[2] || '') : '';
      var bookingUrl = SCHEDULERS[owner];
      if (bookingUrl) {
        var refcode = partner ? owner + '/' + partner : owner;
        document.getElementById('ycbm').src = bookingUrl + '?REFCODE=' + encodeURIComponent(refcode) + '&embed=true';
      } else {
        document.getElementById('schedWrap').style.display = 'none';
        document.getElementById('notice').style.display = 'block';
      }
    })();
  </script>
</body>
</html>
