<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book a Meeting | Ekwa Partners</title>
  <meta name="description" content="Schedule a meeting with the Ekwa Partners team." />
  <style>
    :root {
      --bg-1: #0f0c29;
      --bg-2: #302b63;
      --bg-3: #24243e;
      --accent: #7f5af0;
      --accent-2: #2cb67d;
      --text: #fffffe;
      --muted: #94a1b2;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      color: var(--text);
      background: linear-gradient(-45deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-1));
      background-size: 400% 400%;
      animation: gradientShift 18s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 3rem;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    header { text-align: center; max-width: 640px; margin-bottom: 2rem; }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 0.8rem;
      background: linear-gradient(90deg, #fffffe, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.lead {
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
      color: var(--muted);
      line-height: 1.6;
    }

    .scheduler {
      width: 100%;
      max-width: 900px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 0.5rem;
      backdrop-filter: blur(8px);
    }

    .scheduler iframe { border: 0; width: 100%; min-height: 720px; border-radius: 12px; }

    .notice { display: none; max-width: 520px; text-align: center; color: var(--muted); line-height: 1.6; }

    .ref-tag {
      display: none;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <h1 id="heading">Book a Meeting</h1>
    <p class="lead">Schedule a time that works for you with the Ekwa Partners team.</p>
  </header>

  <div class="scheduler" id="schedWrap">
    <iframe id="ycbm" title="Book a meeting" loading="lazy"></iframe>
  </div>

  <p class="notice" id="notice">
    Please use the booking link your partner shared with you.
  </p>

  <div class="ref-tag" id="refTag"></div>

  <script>
    // ---- Two schedulers, one router ----------------------------------------
    // URL format:  partners.ekwa.com/msm/<owner>/<partner>
    //   owner   = lila | sam   (chooses which scheduler loads)
    //   partner = the individual partner's slug (stored as the referral)
    // REFCODE passed to YCBM = "owner/partner"; n8n splits it into Owner + Partner.
    // ------------------------------------------------------------------------

    var SCHEDULERS = {
      lila: 'https://lila-standalone-partner-t.youcanbook.me/',
      sam:  'https://SAM-BOOKING-DOMAIN.youcanbook.me/'   // <-- replace with Sam's YCBM link
    };

    var parts = location.pathname.split('/').filter(Boolean); // ['msm','lila','john']
    var owner = '', partner = '';
    if (parts[0] === 'msm') {
      owner = (parts[1] || '').toLowerCase();
      partner = parts[2] || '';
    }

    var bookingUrl = SCHEDULERS[owner];

    if (bookingUrl) {
      var refcode = partner ? owner + '/' + partner : owner;
      var src = bookingUrl + (bookingUrl.indexOf('?') === -1 ? '?' : '&')
              + 'REFCODE=' + encodeURIComponent(refcode);
      document.getElementById('ycbm').src = src;
      document.getElementById('heading').textContent =
        'Book a Meeting with ' + owner.charAt(0).toUpperCase() + owner.slice(1) + "'s Team";

      var tag = document.getElementById('refTag');
      tag.textContent = 'Referral: ' + refcode;
      tag.style.display = 'block';
    } else {
      // No valid owner in the path (e.g. someone hit the bare domain).
      document.getElementById('schedWrap').style.display = 'none';
      document.getElementById('notice').style.display = 'block';
    }
  </script>
</body>
</html>
